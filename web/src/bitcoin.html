
<div data-role="page" id="Bitcoin">
	<div data-role="header" data-position="fixed">
		<h1>Bitcoin</h1>
		<a href="#mainMenu" data-rel="main-menu-panel" class="ui-btn ui-btn-left ui-btn-icon-notext ui-icon-bars ui-corner-all"></a>
	</div>
	<div data-role="content">
		<form onsubmit="return false" id="bitcoin_form">
			<div data-role="fieldcontain">
				<div class="dispInlineLabel">
					<label for="btc_source">Price Source</label>
				</div>
				<div class="dispInline">
					<select onchange="elementChange(this)" type="picklist" id="btc_source" data-mini="true">
						<option value="gate">Gate.io</option>
						<option value="coinex">CoinEx</option>
						<option value="hotcoin">Hotcoin</option>
						<option value="okx">OKX</option>
						<option value="coingecko">CoinGecko</option>
						<option value="coindesk">CoinDesk</option>
						<option value="binance">Binance</option>
					</select>
				</div>
			</div>
			<div data-role="fieldcontain">
				<label for="btc_interval">Update Interval (seconds)</label>
				<input maxlength="6"
					onblur="elementBlur(this)" onchange="elementBlur(this)" type="number" id="btc_interval"
					value="300" min="10" max="3600"
					data-mini="true" />
			</div>
			<div data-role="fieldcontain">
				<input onclick="elementChange(this, true)" data-mini="true" id="get_btc" type="button" value="Fetch Now"/>
			</div>
		</form>
	</div>
</div>
